info:
  name: ChunkedPost
  type: http

http:
  method: GET
  url: localhost:8081
  headers:
    - name: Transfer-Encoding
      value: chunked
    - name: Content-Type
      value: text/plain
  body:
    type: text
    data: 5\r\nHello\r\n6\r\n World\r\n0\r\n\r\n
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
