info:
  name: POST_Text
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:8081/
  headers:
    - name: name
      value: Host
    - name: value
      value: maus
    - name: name
      value: Content-Type
    - name: value
      value: text/plain
    - name: name
      value: Connection
    - name: value
      value: close
  body:
    type: text
    data: hello World
  auth: inherit

settings:
  encodeUrl: true
  timeout: 3000
  followRedirects: true
  maxRedirects: 5
