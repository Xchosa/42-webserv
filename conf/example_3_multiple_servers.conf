#https://nginx.org/en/docs/http/ngx_http_core_module.html#client_body_timeout
#nginx: [emerg] invalid value "asdf" in "autoindex" directive, it must be "on" or "off" in /etc/nginx/http.d/vhost.conf:10
server {
	listen 0.0.0.0:8081;
	#server_name anders.com;
	# autoindex off;
	root ./html/static;
	index index.html;
	location / {
	methods GET POST DELETE;
	}
}

server {
	listen 0.0.0.0:8081;
	server_name example.com;
	# autoindex off;
	root ./html/static;
	index static_index.html;
	location / {
	methods GET POST DELETE;
	}
}

server {
	listen 8081;
	# autoindex on;
	root ./html/directory;
	location /
	{
		autoindex on;
	}
	location /permanently/moved/url {
		return 301 http://www.example.com/moved/here;
	}
}
server {
	listen 8081;
	server_name Brillant.com;
	root ./html/directory;
	location /
	{
		autoindex on;
	}
	location /permanently/moved/url {
		return 301 http://www.example.com/moved/here;
	}
}


server {
	# client_header_buffer_size 1k;
	# client_timeout 60s;
	client_max_body_size 1m;

	listen 0.0.0.0:8082;
	# autoindex on;
	root ./html/;
	location /upload/ {
		root	./html/upload_files;
		upload	on;
		methods	GET POST DELETE;
	}
}

server {
	listen 127.0.0.1:8084;
	server_name localhost;
	# autoindex off;
	root ./html/static;
	index index.html;

	location /cgi-php/ {
		root ./html/cgi_files/php;
		cgi_ext .php /usr/bin/php-cgi;
		index index.php;
	}
}
#WWITHOUT HEADER 
server {
	listen 127.0.0.1:8089;
	server_name localhost;
	# autoindex off;
	root ./html/static;
	index index.html;

	location /cgi-py/ {
		cgi_ext .py /usr/bin/python3;
		root ./html/cgi_files/py;
		index test.py;
	}
}

server {
	listen 0.0.0.0:8085;
	# autoindex on;
	root ./html/static;
	index index.html;
}

server {
	listen 8087;
	server_name example.com beispiel.com;
	root /;
	index README.md;
}

