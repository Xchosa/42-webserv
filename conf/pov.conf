server {
    listen 8081;
    server_name maus;

	root ./danceserv;
    # index index.html;

    error_page 404 /www/errors/404.html;

     location / {
        index           index.html;
        methods         GET POST;
        upload			on;
     }

    location /vogel {
		root			./danceserv;
        index           index.html;
        methods         GET POST;
        autoindex       off;
        upload			on;
    }

   
    location /auto {
        root            ./danceserv;
        index           index.html;
        methods         GET POST DELETE;
		upload			on;
        autoindex       on;
    }

    location /maus {
		root			./danceserv;
        index           index.html;
        methods         GET POST DELETE;
		upload			on;
        autoindex       off;
    }



    location /hund {
		root			./futter;
        index           index.html;
        methods         GET POST;
        autoindex       off;
        upload			on;
    }
}
