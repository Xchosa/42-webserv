server {
    listen 8081;
    server_name maus;

	root ./danceserv;
    # index index.html;

    error_page 404 /www/errors/404.html;

     location / {
         index           index.html;
         methods         GET POST;
        # autoindex       on;
     }

    location /vogel {
		root			./danceserv;
        index           index.html;
        methods         GET POST;
        autoindex       off;
    }

   
    location /maus {
        index           index.html;
        methods         GET POST;
        upload_store    ./uploads;
        autoindex       off;
    }
    #location /maus {
	#	root			danceserv;
    #    index           index.html;
    #    methods         GET POST;
    #    upload_store    uploads;
    #    autoindex       off;
    #}



    location /hund {
		root			./futter;
        index           index.html;
        methods         GET POST;
        autoindex       off;
    }
}
