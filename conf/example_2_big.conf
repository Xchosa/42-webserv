# ─────────────────────────────────────────
#  Server Block 1 – Haupt-Website (Port 8080)
# ─────────────────────────────────────────
server {
    listen              0.0.0.0:8080;
    server_name         localhost;

    # Maximale Größe des Request-Body (z.B. für Uploads)
    client_max_body_size 10M;

    # Standard-Fehlerseiten
    error_page 400 /errors/400.html;
    error_page 403 /errors/403.html;
    error_page 404 /errors/404.html;
    error_page 405 /errors/405.html;
    error_page 413 /errors/413.html;
    error_page 500 /errors/500.html;

    # ── Root-Location ──────────────────────
    location / {
        root            ./www;
        index           index.html;
        methods         GET POST;
        autoindex       off;
    }

    # ── Directory Listing aktiviert ────────
    location /files {
        root            ./www;
        methods         GET;
        autoindex       on;         # Zeigt Verzeichnisinhalt als HTML-Liste
    }

    # ── Statische Assets ───────────────────
    location /static {
        root            ./www/static;
        methods         GET;
        autoindex       off;
        index           index.html;
    }

    # ── File Upload ────────────────────────
    location /upload {
        methods         POST DELETE;
        autoindex       off;
        upload_store    ./uploads;  # Verzeichnis wo Uploads gespeichert werden
        client_max_body_size 50M;   # Lokal überschreiben für Uploads
    }

    # ── HTTP Redirect ──────────────────────
    location /old-page {
        return          301 /new-page;
    }

    location /new-page {
        root            ./www;
        methods         GET;
        index           new-page.html;
        autoindex       off;
    }

    # ── CGI – Python ───────────────────────
    location /cgi-bin {
        root            ./cgi-bin;
        methods         GET POST;
        autoindex       off;
        cgi_ext         .py  /usr/bin/python3;
        cgi_ext         .php /usr/bin/php-cgi;
    }

    # ── URL zu Verzeichnis gemappt ─────────
    # /kapouet  →  /tmp/www
    # Anfrage auf /kapouet/pouic/toto/pouet sucht in /tmp/www/pouic/toto/pouet
    location /kapouet {
        root            /tmp/www;
        methods         GET;
        autoindex       on;
    }
}

# ─────────────────────────────────────────
#  Server Block 2 – zweite Website (Port 9090)
# ─────────────────────────────────────────
server {
    listen              0.0.0.0:9090;
    server_name         second-site;

    client_max_body_size 1M;

    error_page 404 /errors/404.html;
    error_page 500 /errors/500.html;

    # ── Root ───────────────────────────────
    location / {
        root            ./www2;
        index           index.html;
        methods         GET;
        autoindex       off;
    }

    # ── Nur DELETE erlaubt ─────────────────
    location /api/resource {
        root            ./www2/api;
        methods         DELETE;
        autoindex       off;
    }

    # ── Redirect auf andere Domain/Port ────
    location /go-to-main {
        return          302 http://localhost:8080/;
    }
}

# ─────────────────────────────────────────
#  Server Block 3 – dritter Port (Port 7070)
#  Zeigt: mehrere Ports = mehrere "Websites"
# ─────────────────────────────────────────
server {
    listen              127.0.0.1:7070;
    server_name         admin;

    client_max_body_size 5M;

    error_page 403 /errors/403.html;
    error_page 404 /errors/404.html;

    location / {
        root            ./www-admin;
        index           index.html;
        methods         GET POST DELETE;
        autoindex       off;
    }

    # ── CGI nur Python ─────────────────────
    location /scripts {
        root            ./cgi-bin/admin;
        methods         GET POST;
        autoindex       off;
        cgi_ext         .py /usr/bin/python3;
    }

    # ── Upload mit eigenem Limit ───────────
    location /upload {
        methods         POST;
        upload_store    ./uploads/admin;
        client_max_body_size 20M;
    }
}