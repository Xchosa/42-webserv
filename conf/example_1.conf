server {
    listen 80;
	listen 127.0.0.1:80;
    server_name name;
	is_default_server false;

	root /usr/share/nginx/html;
    index index.html;

    location /root {
        index           index.html;
        methods         GET POST;
        autoindex       off;
		return          302 http://localhost:8080/;
		upload_store    ./uploads/admin;
		cgi_ext         .py /usr/bin/python3;
    }

    location /abc {
        index           index.html;
		root			/herbert;
        methods         GET POST;
        autoindex       off;
		return          302 http://localhost:8080/;
		upload_store    ./uploads/admin;
		cgi_ext         .py /usr/bin/python3;
    }

    location /def {
        index           index.html;
        methods         GET POST;
        autoindex       off;
		return          302 http://localhost:8080/;
		upload_store    ./uploads/admin;
		cgi_ext         .py /usr/bin/python3;
    }

}
