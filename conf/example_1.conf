server {
    listen 8081;
	listen 0.0.0.0:8080;
    server_name localhost;
	is_default_server false;
	client_max_body_size 5m;

	root /usr/share/nginx/html;
    index index.html;

    error_page 404 /errors/404.html;

    location /root {
        index           index.html;
        methods         GET POST;
        autoindex       off;
		return          302 http://localhost:8080/;
		upload_store    ./uploads/admin;
		cgi_ext         .py /usr/bin/python3;
    }

    location /abc {
        index           index.html;
		root			/herbert;
        methods         GET POST;
        autoindex       off;
		return          302 http://localhost:8080/;
		upload_store    ./uploads/admin;
		cgi_ext         .py /usr/bin/python3;
    }

    location /def {
        index           index.html;
        methods         GET POST;
        autoindex       off;
		return          302 http://localhost:8080/;
		upload_store    ./uploads/admin;
		cgi_ext         .py /usr/bin/python3;
    }

}
