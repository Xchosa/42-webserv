server {
    listen 8081;
    server_name vogel;

	root ./bbqserv;
    # index index.html;

    error_page 404 /www/errors/404.html;

    location / {
        index           index.html;
        methods         GET POST;
        autoindex       on;
    }

	location /cgi {
		methods		GET POST;
      	cgi_ext  	.py /usr/bin/python3;
  	}
}
