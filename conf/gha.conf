server {
    listen 8081;
    server_name vogel;

	root /usr/share/nginx/html;
    index index.html;

    error_page 404 /errors/404.html;

    # location / {
    #     index           index.html;
    #     methods         GET POST;
    #     autoindex       off;
    # }

    location /root {
        index           index.html;
        methods         GET POST;
        autoindex       off;
    }

    location /root/test/nocheiner {
        index           index.html;
        methods         GET POST;
        autoindex       off;
    }

    location /fledermaus {
        index           index.html;
        methods         GET POST;
        autoindex       off;
    }
}
