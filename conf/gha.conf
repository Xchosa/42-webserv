server {
    listen 8081;
    server_name vogel;

	root ./grillserv;
    index index.html;

    error_page 404 /www/errors/404.html;

    # location / {
    #     index           index.html;
    #     methods         GET POST;
    #     autoindex       off;
    # }

    location /root {
		root			/root;
        index           index.html;
        methods         GET POST;
        autoindex       off;
    }

    location /root/test/nocheiner {
        index           index.html;
        methods         GET POST;
        autoindex       off;
    }

    location /fledermaus {
        index           index.html;
        methods         GET POST;
        autoindex       off;
    }

	location /amazon {
		return 301 https://www.amazon.de/;
	}
}
